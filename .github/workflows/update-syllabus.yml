name: Update syllabus D1

on:
  workflow_dispatch:
    inputs:
      year:
        description: Academic year to crawl
        required: true
        default: "2026"
      start_page:
        description: First search result page to crawl
        required: true
        default: "1"
      end_page:
        description: Last search result page to crawl
        required: true
        default: "1"
      limit:
        description: Maximum detail pages to fetch. Use 0 for no limit.
        required: true
        default: "0"
  schedule:
    - cron: "12 18 1 * *"

concurrency:
  group: update-syllabus-d1
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      YEAR: ${{ github.event.inputs.year || '2026' }}
      START_PAGE: ${{ github.event.inputs.start_page || '1' }}
      END_PAGE: ${{ github.event.inputs.end_page || '1' }}
      LIMIT: ${{ github.event.inputs.limit || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Crawl syllabus into SQLite
        run: |
          python scripts/crawl-syllabus.py \
            --year "$YEAR" \
            --start-page "$START_PAGE" \
            --end-page "$END_PAGE" \
            --limit "$LIMIT" \
            --delay 1.5 \
            --page-delay 2.0 \
            --db work/ibaraki_syllabus.sqlite

      - name: Export D1 seed chunks
        run: python scripts/export-d1-seed.py --db work/ibaraki_syllabus.sqlite --chunk-size 500

      - name: Apply D1 schema
        run: npx wrangler d1 execute ibaraki_syllabus --remote --file migrations/0001_schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import D1 seed chunks
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(work/d1_seed/*.sql)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No D1 seed chunks were generated."
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "Importing ${file}"
            npx wrangler d1 execute ibaraki_syllabus --remote --file "$file"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload SQLite snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ibaraki-syllabus-sqlite-${{ env.YEAR }}-p${{ env.START_PAGE }}-${{ env.END_PAGE }}
          path: work/ibaraki_syllabus.sqlite
          if-no-files-found: ignore
          retention-days: 7
