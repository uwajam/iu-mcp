name: Update syllabus D1

on:
  workflow_dispatch:
    inputs:
      year:
        description: Academic year to crawl
        required: true
        default: "2026"
      max_pages:
        description: Maximum result pages to crawl. Use 0 for all pages.
        required: true
        default: "0"
  schedule:
    - cron: "12 18 1 * *"

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      YEAR: ${{ github.event.inputs.year || '2026' }}
      MAX_PAGES: ${{ github.event.inputs.max_pages || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - name: Crawl syllabus into SQLite
        run: |
          python scripts/crawl-syllabus.py \
            --year "$YEAR" \
            --max-pages "$MAX_PAGES" \
            --delay 1.5 \
            --page-delay 2.0 \
            --db work/ibaraki_syllabus.sqlite

      - name: Export D1 seed chunks
        run: python scripts/export-d1-seed.py --db work/ibaraki_syllabus.sqlite --chunk-size 500

      - name: Apply D1 schema
        run: npx wrangler d1 execute ibaraki_syllabus --remote --file migrations/0001_schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import D1 seed chunks
        shell: bash
        run: |
          set -euo pipefail
          for file in work/d1_seed/*.sql; do
            echo "Importing ${file}"
            npx wrangler d1 execute ibaraki_syllabus --remote --file "$file"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload SQLite snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ibaraki-syllabus-sqlite-${{ env.YEAR }}
          path: work/ibaraki_syllabus.sqlite
          if-no-files-found: ignore
          retention-days: 7
