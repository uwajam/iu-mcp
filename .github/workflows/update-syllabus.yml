name: Update syllabus D1

on:
  workflow_dispatch:
    inputs:
      year:
        description: Academic year to crawl
        required: true
        default: "2026"
      start_page:
        description: First search result page to crawl
        required: true
        default: "1"
      end_page:
        description: Last search result page to crawl
        required: true
        default: "1"
      limit:
        description: Maximum detail pages to fetch. Use 0 for no limit.
        required: true
        default: "0"
  schedule:
    - cron: "12 18 * * 0"

concurrency:
  group: update-syllabus-d1
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
    env:
      YEAR: ${{ github.event.inputs.year || '2026' }}
      LIMIT: ${{ github.event.inputs.limit || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Resolve crawl range
        id: range
        shell: bash
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            start_page="${{ github.event.inputs.start_page }}"
            end_page="${{ github.event.inputs.end_page }}"
          else
            # 72 pages / 8 pages per run = 9 weekly batches.
            anchor="2026-06-07"
            anchor_epoch="$(date -u -d "$anchor 00:00:00" +%s)"
            now_epoch="$(date -u +%s)"
            weeks_since_anchor="$(( (now_epoch - anchor_epoch) / 604800 ))"
            batch="$(( weeks_since_anchor % 9 ))"
            if [ "$batch" -lt 0 ]; then
              batch="$(( batch + 9 ))"
            fi
            start_page="$(( batch * 8 + 1 ))"
            end_page="$(( start_page + 7 ))"
          fi

          echo "START_PAGE=$start_page" >> "$GITHUB_ENV"
          echo "END_PAGE=$end_page" >> "$GITHUB_ENV"
          echo "start_page=$start_page" >> "$GITHUB_OUTPUT"
          echo "end_page=$end_page" >> "$GITHUB_OUTPUT"
          echo "Resolved crawl range: pages $start_page-$end_page"

      - name: Crawl syllabus into SQLite
        run: |
          python jobs/syllabus-crawler/crawl-syllabus.py \
            --year "$YEAR" \
            --start-page "$START_PAGE" \
            --end-page "$END_PAGE" \
            --limit "$LIMIT" \
            --delay 1.5 \
            --page-delay 2.0 \
            --detail-retries 3 \
            --retry-delay 10 \
            --max-detail-errors 50 \
            --db work/ibaraki_syllabus.sqlite

      - name: Export D1 seed chunks
        run: python jobs/syllabus-crawler/export-d1-seed.py --db work/ibaraki_syllabus.sqlite --chunk-size 500

      - name: Apply D1 schema
        run: npx wrangler d1 execute ibaraki_syllabus --remote --file migrations/0001_schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import D1 seed chunks
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(work/d1_seed/*.sql)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No D1 seed chunks were generated."
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "Importing ${file}"
            npx wrangler d1 execute ibaraki_syllabus --remote --file "$file"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload SQLite snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ibaraki-syllabus-sqlite-${{ env.YEAR }}-p${{ steps.range.outputs.start_page }}-${{ steps.range.outputs.end_page }}
          path: work/ibaraki_syllabus.sqlite
          if-no-files-found: ignore
          retention-days: 7
