name: Update PDF sources D1

on:
  workflow_dispatch:
    inputs:
      limit:
        description: Maximum PDFs to fetch. Use 0 for no limit.
        required: true
        default: "0"
  schedule:
    - cron: "35 19 * * *"

concurrency:
  group: update-pdf-sources-d1
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    env:
      LIMIT: ${{ github.event.inputs.limit || '0' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - name: Install PDF extraction dependency
        run: python -m pip install pypdf

      - name: Restore PDF crawler state
        uses: actions/cache@v4
        with:
          path: work/iu_mcp.sqlite
          key: pdf-source-state-${{ github.run_id }}
          restore-keys: |
            pdf-source-state-

      - name: Crawl engineering PDF source page
        run: |
          python jobs/pdf-source-crawler/crawl-pdf-source.py \
            --db work/iu_mcp.sqlite \
            --source-page-url "https://www.eng.ibaraki.ac.jp/education/class/" \
            --delay 1.0 \
            --limit "$LIMIT"

      - name: Export PDF D1 seed chunks
        run: python jobs/pdf-importer/export-d1-seed.py --db work/iu_mcp.sqlite --chunk-size 500 --mode upsert

      - name: Apply D1 schema
        run: npx wrangler d1 execute ibaraki_syllabus --remote --file migrations/0001_schema.sql
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Import PDF D1 seed chunks
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          files=(work/pdf_d1_seed/*.sql)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No PDF D1 seed chunks were generated."
            exit 0
          fi
          for file in "${files[@]}"; do
            echo "Importing ${file}"
            npx wrangler d1 execute ibaraki_syllabus --remote --file "$file"
          done
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Upload PDF SQLite snapshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: iu-mcp-pdf-state
          path: work/iu_mcp.sqlite
          if-no-files-found: ignore
          retention-days: 14
